<template>
    <lightning-card title="Email Backups" icon-name="standard:email_chatter">
        <div class="container">
            <div class="toolbar">
                <lightning-button
                    label="Refresh"
                    variant="neutral"
                    onclick={handleRefresh}
                    disabled={isLoading}
                ></lightning-button>
            </div>

            <template lwc:if={isLoading}>
                <div class="state-row">
                    <lightning-spinner alternative-text="Loading email backups" size="small"></lightning-spinner>
                </div>
            </template>

            <template lwc:elseif={errorMessage}>
                <div class="state-row error">{errorMessage}</div>
            </template>

            <template lwc:elseif={hasRows}>
                <lightning-datatable
                    key-field="id"
                    data={rows}
                    columns={columns}
                    hide-checkbox-column={hideCheckboxColumn}
                    onrowaction={handleRowAction}
                ></lightning-datatable>
            </template>

            <template lwc:elseif={isEmpty}>
                <div class="state-row empty">No EmailMessage backups found for this record.</div>
            </template>
        </div>
    </lightning-card>

    <template if:true={isModalOpen}>
        <div class="slds-backdrop slds-backdrop_open"></div>
        <section
            role="dialog"
            tabindex="-1"
            aria-modal="true"
            aria-label="Email preview"
            class="slds-modal slds-fade-in-open slds-modal_large"
        >
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Email Preview</h2>
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        variant="bare"
                        class="slds-modal__close"
                        onclick={closeModal}
                    ></lightning-button-icon>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={modalErrorMessage}>
                        <div class="slds-text-color_error slds-m-bottom_medium">{modalErrorMessage}</div>
                    </template>

                    <template if:true={modalIsLoading}>
                        <lightning-spinner alternative-text="Loading email details" size="medium"></lightning-spinner>
                    </template>

                    <template if:false={modalIsLoading}>
                        <div class="slds-m-bottom_medium">
                            <div class="subject-title">{selectedEmailSubject}</div>
                        </div>

                        <div class="preview-grid slds-box slds-m-bottom_medium">
                            <template for:each={previewEntries} for:item="entry">
                                <div key={entry.key} class="preview-row">
                                    <div class="preview-key">{entry.key}</div>
                                    <div class="preview-value">
                                        <template if:true={entry.hasUrl}>
                                            <a href={entry.url} target="_blank">{entry.value}</a>
                                        </template>
                                        <template if:false={entry.hasUrl}>
                                            {entry.value}
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div class="slds-box slds-m-bottom_medium">
                            <div class="slds-text-heading_small slds-m-bottom_small">Versions</div>
                            <div>{versionsCount} version(s) available</div>
                        </div>

                        <div class="slds-box">
                            <div class="slds-text-heading_small slds-m-bottom_small">Attachments</div>
                            <template if:true={hasAttachments}>
                                <ul class="attachments-list">
                                    <template for:each={attachments} for:item="att">
                                        <li key={att.id} class="attachments-item">
                                            <div class="attachments-title">{att.id}</div>
                                            <template if:true={att.fieldsEntries}>
                                                <div class="attachments-fields">
                                                    <template for:each={att.fieldsEntries} for:item="kv">
                                                        <div key={kv.key} class="attachments-field">
                                                            <span class="attachments-field-key">{kv.key}:</span>
                                                            <span class="attachments-field-value">{kv.value}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template if:false={hasAttachments}>
                                <div>No attachments available.</div>
                            </template>
                        </div>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Close" variant="neutral" onclick={closeModal}></lightning-button>
                </footer>
            </div>
        </section>
    </template>
</template>
