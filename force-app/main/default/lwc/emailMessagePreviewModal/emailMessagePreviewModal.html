<template>
    <lightning-modal-header label="Email Preview"></lightning-modal-header>

    <lightning-modal-body>
        <template if:true={modalErrorMessage}>
            <div class="slds-text-color_error slds-m-bottom_medium">{modalErrorMessage}</div>
        </template>

        <template if:true={modalIsLoading}>
            <lightning-spinner alternative-text="Loading email details" size="medium"></lightning-spinner>
        </template>

        <template if:false={modalIsLoading}>
            <div class="slds-m-bottom_medium">
                <div class="subject-title">{subjectDisplay}</div>

                <div class="top-grid slds-box slds-m-top_medium">
                    <div class="top-row">
                        <div class="top-key">From</div>
                        <div class="top-value">{fromAddress}</div>
                    </div>
                    <div class="top-row">
                        <div class="top-key">To</div>
                        <div class="top-value">{toAddress}</div>
                    </div>
                    <template if:true={ccAddress}>
                        <div class="top-row">
                            <div class="top-key">CC</div>
                            <div class="top-value">{ccAddress}</div>
                        </div>
                    </template>
                    <template if:true={bccAddress}>
                        <div class="top-row">
                            <div class="top-key">BCC</div>
                            <div class="top-value">{bccAddress}</div>
                        </div>
                    </template>
                </div>
            </div>

            <template if:true={htmlBody}>
                <div class="slds-box slds-m-bottom_medium">
                    <div class="section-title">HTML Body</div>
                    <lightning-formatted-rich-text value={htmlBody}></lightning-formatted-rich-text>
                </div>
            </template>

            <template if:true={textBody}>
                <div class="slds-box slds-m-bottom_medium">
                    <div class="section-title">Text Body</div>
                    <pre class="body-pre">{textBody}</pre>
                </div>
            </template>

            <div class="preview-grid slds-box slds-m-bottom_medium">
                <template for:each={previewEntries} for:item="entry">
                    <div key={entry.key} class="preview-row">
                        <div class="preview-key">{entry.key}</div>
                        <div class="preview-value">
                            <template if:true={entry.hasUrl}>
                                <a href={entry.url} target="_blank" rel="noopener noreferrer">{entry.value}</a>
                            </template>
                            <template if:false={entry.hasUrl}>{entry.value}</template>
                        </div>
                    </div>
                </template>
            </div>

            <div class="slds-box slds-m-bottom_medium">
                <div class="slds-text-heading_small slds-m-bottom_small">Versions</div>
                <div>{versionsCount} version(s) available</div>
            </div>

            <div class="slds-box">
                <div class="slds-text-heading_small slds-m-bottom_small">Attachments</div>
                <template if:true={hasAttachments}>
                    <ul class="attachments-list">
                        <template for:each={attachments} for:item="att">
                            <li key={att.id} class="attachments-item">
                                <div class="attachment-row">
                                    <lightning-icon icon-name={att.icon} size="small" class="attachment-icon"></lightning-icon>
                                    <div class="attachment-info">
                                        <div class="attachment-filename">{att.fileName}</div>
                                        <div class="attachment-meta">
                                            <span>{att.contentSize}</span>
                                            <template if:true={att.fileExtension}>
                                                <span class="attachment-separator">•</span>
                                                <span>{att.fileExtension}</span>
                                            </template>
                                        </div>
                                    </div>
                                    <lightning-button
                                        label="Download"
                                        variant="brand-outline"
                                        size="small"
                                        data-path={att.downloadPath}
                                        onclick={handleDownload}
                                    ></lightning-button>
                                </div>
                            </li>
                        </template>
                    </ul>
                </template>
                <template if:false={hasAttachments}>
                    <div>No attachments available.</div>
                </template>
            </div>
        </template>
    </lightning-modal-body>

    <lightning-modal-footer>
        <lightning-button label="Close" variant="neutral" onclick={handleClose}></lightning-button>
    </lightning-modal-footer>
</template>
